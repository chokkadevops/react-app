# docker-compose.yml IaC for React Application.
# HOST_PORT is standardized environment variable declaration.

version: '3.8'

services:
  react-app:
    # Uses the IMAGE_NAME and BUILD_NUMBER passed from Jenkins, defaulting to latest locally
    image: ${IMAGE_NAME:-react-test-app}:${BUILD_NUMBER:-latest}
    container_name: react-test-container
    
    build:
      context: .
      dockerfile: Dockerfile
    
    ports:
      - "${HOST_PORT:-8081}:80"
    
    #environment:
    #  - NODE_ENV=${NODE_ENV:-production}
    #  - REACT_APP_API_URL=${REACT_APP_API_URL}

    restart: unless-stopped