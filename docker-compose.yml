# docker-compose.yml IaC for React Application.
# HOST_PORT is standardized environment variable declaration.

version: '3.8'

services:
  react-app:
    image: ${IMAGE_NAME}:${TAG}
    container_name: react-test-container
    ports:
      - "${HOST_PORT}:80"
    restart: unless-stopped