# docker-compose.yml IaC for React Application.
# HOST_PORT is standardized environment variable declaration.
# HOST_PORT_ONE and HOST_PORT_TWO are declared for two separate services.

# Added by Chokka. version syntax is obsolete. 
#version: '3.8'

services:
  react-app:
    image: ${IMAGE_NAME}:${TAG}
    container_name: react-test-container
    ports:
      - "${HOST_PORT_ONE}:80"
    restart: unless-stopped

# Testing / Learning purpose on having multiple containers.
# Purpose to define database connection.
# Purpose to define webservices or rest services.

  
  react-app-two:
    image: ${IMAGE_NAME}:${TAG}
    container_name: react-test-container-2
    ports:
      - "${HOST_PORT_TWO}:80"
    restart: unless-stopped